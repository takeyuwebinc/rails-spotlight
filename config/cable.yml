# The agent response job runs in a separate process (bin/jobs) and broadcasts
# Turbo Streams to the web process, so a cross-process adapter is required
# even in development (async only works within a single process).
development:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds
  message_retention: 1.day

test:
  adapter: test

production:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds
  message_retention: 1.day
